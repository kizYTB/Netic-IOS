name: NeticAI

options:
  bundleIdPrefix: fr.neticai
  deploymentTarget:
    iOS: "16.0"

targets:
  NeticAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: fr.neticai.NeticAI
      PRODUCT_NAME: NeticAI
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"

    sources:
      - path: Sources

    resources:
      - path: Resources/Assets.xcassets

    info:
      path: Info.plist
