name: Netic
options:
  bundleIdPrefix: fr.neticai
targets:
  Netic:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: fr.neticai.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ENABLE_BITCODE: NO
        CLANG_ENABLE_MODULES: YES
        SWIFT_VERSION: 5.0
        SDKROOT: iphoneos
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: "-"
        AD_HOC_CODE_SIGNING_ALLOWED: YES
    info:
      path: Info.plist
      properties:
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UILaunchStoryboardName: LaunchScreen
        NSCameraUsageDescription: Netic a besoin d'accéder à votre caméra pour analyser des images.
        NSMicrophoneUsageDescription: Netic a besoin d'accéder à votre microphone pour les commandes vocales.
