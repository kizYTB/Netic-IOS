name: NeticAI

options:
  bundleIdPrefix: fr.neticai
  deploymentTarget:
    iOS: "16.0"

targets:
  NeticAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: fr.neticai.NeticAI
      PRODUCT_NAME: NeticAI
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_STANDALONE_ICON_BEHAVIOR: all
      INFOPLIST_KEY_CFBundleIconName: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      MARKETING_VERSION: "1.1"
      CURRENT_PROJECT_VERSION: "1"

    sources:
      - path: Sources
      - path: Resources

    postBuildScripts:
      - name: Embed App Icons
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          APP_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          bash "${SRCROOT}/Scripts/embed_app_icons.sh" "${APP_DIR}" "${SRCROOT}"

    info:
      path: Info.plist
