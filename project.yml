name: NeticAI

options:
  bundleIdPrefix: fr.neticai
  deploymentTarget:
    iOS: "16.0"

targets:
  NeticAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: fr.neticai.NeticAI
      PRODUCT_NAME: NeticAI
      INFOPLIST_FILE: Info.plist
      GENERATE_INFOPLIST_FILE: NO
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_CFBundleIconName: AppIcon
      TARGETED_DEVICE_FAMILY: "1"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"

    sources:
      - path: Sources

    # XcodeGen n'ajoute pas toujours la phase "Compile Asset Catalog" :
    # on compile explicitement Assets.xcassets avec actool.
    postBuildScripts:
      - name: Compile Asset Catalog
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          ASSET_DIR="${SRCROOT}/Resources/Assets.xcassets"
          APP_DIR="${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          if [ ! -d "${ASSET_DIR}" ]; then
            echo "error: ${ASSET_DIR} introuvable"
            exit 1
          fi
          mkdir -p "${APP_DIR}"
          xcrun actool "${ASSET_DIR}" \
            --compile "${APP_DIR}" \
            --platform iphoneos \
            --minimum-deployment-target 16.0 \
            --app-icon AppIcon \
            --target-device iphone \
            --compress-pngs \
            --enable-on-demand-resources NO \
            --output-partial-info-plist "${DERIVED_FILE_DIR}/assetcatalog_generated_info.plist"
          if [ ! -f "${APP_DIR}/Assets.car" ]; then
            echo "error: Assets.car non généré dans ${APP_DIR}"
            ls -la "${APP_DIR}" || true
            exit 1
          fi
          PARTIAL_PLIST="${DERIVED_FILE_DIR}/assetcatalog_generated_info.plist"
          if [ -f "${PARTIAL_PLIST}" ]; then
            /usr/libexec/PlistBuddy -c "Merge ${PARTIAL_PLIST}" "${APP_DIR}/Info.plist" 2>/dev/null || true
          fi
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "${APP_DIR}/Info.plist" >/dev/null 2>&1 \
            && /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "${APP_DIR}/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "${APP_DIR}/Info.plist"
          echo "OK: Assets.car + CFBundleIconName dans ${APP_DIR}"

    info:
      path: Info.plist
