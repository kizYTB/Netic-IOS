workflows:
  ios-build:
    name: Netic iOS Build

    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Generate project
        script: xcodegen generate

      - name: Build iOS app (.ipa)
        script: |
          set -e

          xcodebuild clean archive \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/NeticAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/Payload
          cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/

          cd build
          zip -r NeticAI.ipa Payload/

    artifacts:
      - build/NeticAI.ipa
