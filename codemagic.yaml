workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build iOS app (.ipa)
        script: |
          # Install XcodeGen
          brew install xcodegen

          # Generate Xcode project
          xcodegen generate

          # Build de l'application
          xcodebuild clean build \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/NeticAI.xcarchive archive

          # Packaging en IPA
          mkdir -p build/Payload
          cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/

    artifacts:
      - build/NeticAI.ipa
      - /tmp/xcodebuild_logs/*.log
