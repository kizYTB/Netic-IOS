workflows:
  ios-workflow:
    name: Netic iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Install dependencies
        script: |
          # Si vous utilisez Swift Package Manager ou CocoaPods
          # xcodebuild -resolvePackageDependencies
          echo "Dependencies installed"
      - name: Build iOS App for Simulator
        script: |
          # Build pour le simulateur (ne nécessite pas de certificat)
          xcodebuild build \
            -project "Netic.xcodeproj" \
            -scheme "Netic" \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath $CM_BUILD_DIR/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
      - name: Package Simulator App
        script: |
          # On compresse l'application .app pour qu'elle soit téléchargeable
          cd $CM_BUILD_DIR/DerivedData/Build/Products/Debug-iphonesimulator
          zip -r $CM_EXPORT_DIR/Netic-Simulator.zip Netic.app
    artifacts:
      - $CM_EXPORT_DIR/*.zip
    publishing:
      email:
        recipients:
          - kylian@jtheberg.cloud # À adapter si besoin
        notify:
          success: true
          failure: true
