workflows:
  ios-workflow:
    name: Netic iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Install dependencies
        script: |
          # Si vous utilisez Swift Package Manager ou CocoaPods
          # xcodebuild -resolvePackageDependencies
          echo "Dependencies installed"
      - name: Build iOS App
        script: |
          # Build de l'archive .xcarchive
          xcodebuild build \
            -project "Netic.xcodeproj" \
            -scheme "Netic" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/Netic.xcarchive \
            archive
      - name: Export IPA
        script: |
          # Export de l'archive vers un fichier .ipa
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/Netic.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $CM_EXPORT_DIR
    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - kylian@jtheberg.cloud # À adapter si besoin
        notify:
          success: true
          failure: true
