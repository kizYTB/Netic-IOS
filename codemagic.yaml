workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - github key
      vars:
        GITHUB_REPO: "kizYTB/Netic-IOS"
        RELEASE_TAG: "latest-build"
    scripts:
      - name: Build iOS app (.ipa)
        script: |
          brew install xcodegen
          xcodegen generate

          xcodebuild clean archive \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/NeticAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            INFOPLIST_KEY_CFBundleIconName=AppIcon \
            INFOPLIST_FILE=Info.plist \
            GENERATE_INFOPLIST_FILE=NO

          APP_PATH="build/NeticAI.xcarchive/Products/Applications/NeticAI.app"
          ASSET_DIR="$(pwd)/Resources/Assets.xcassets"
          PARTIAL_PLIST="/tmp/assetcatalog_generated_info.plist"

          if [ ! -f "$APP_PATH/Assets.car" ]; then
            echo "Compilation actool du catalogue d'assets..."
            xcrun actool "$ASSET_DIR" \
              --compile "$APP_PATH" \
              --platform iphoneos \
              --minimum-deployment-target 16.0 \
              --app-icon AppIcon \
              --target-device iphone \
              --compress-pngs \
              --enable-on-demand-resources NO \
              --output-partial-info-plist "$PARTIAL_PLIST"
          fi

          if [ ! -f "$APP_PATH/Assets.car" ]; then
            echo "ERREUR: Assets.car absent après actool."
            ls -la "$APP_PATH" || true
            exit 1
          fi

          if [ -f "$PARTIAL_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Merge $PARTIAL_PLIST" "$APP_PATH/Info.plist" 2>/dev/null || true
          fi
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PATH/Info.plist" >/dev/null 2>&1 \
            && /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$APP_PATH/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$APP_PATH/Info.plist"

          ICON_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          if [ "$ICON_NAME" != "AppIcon" ]; then
            echo "ERREUR: CFBundleIconName='$ICON_NAME' (attendu: AppIcon)"
            exit 1
          fi

          echo "Icône OK — Assets.car ($(wc -c < "$APP_PATH/Assets.car" | tr -d ' ') octets), CFBundleIconName=AppIcon"

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/

      - name: Publish GitHub Release
        script: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERREUR : GITHUB_TOKEN n'est pas défini !"
            exit 1
          fi

          echo "Token détecté : ${GITHUB_TOKEN:0:6}..."

          RELEASE_ID=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPO/releases/tags/$RELEASE_TAG" \
            | grep '"id"' | head -1 | grep -o '[0-9]*')

          if [ -n "$RELEASE_ID" ]; then
            echo "Suppression release $RELEASE_ID..."
            curl -s -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$GITHUB_REPO/releases/$RELEASE_ID"
          fi

          curl -s -X DELETE \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPO/git/refs/tags/$RELEASE_TAG"

          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GITHUB_REPO/releases" \
            -d "{
              \"tag_name\": \"$RELEASE_TAG\",
              \"name\": \"Netic AI - Build $(date '+%d/%m/%Y %H:%M')\",
              \"body\": \"Build automatique via Codemagic\",
              \"draft\": false,
              \"prerelease\": false
            }")

          echo "Réponse GitHub : $RELEASE"

          if echo "$RELEASE" | grep -q '"Bad credentials"'; then
            echo "ERREUR : Token GitHub invalide !"
            exit 1
          fi

          UPLOAD_URL=$(echo "$RELEASE" | grep -o '"upload_url": "[^"]*"' | grep -o 'https://[^{]*')

          if [ -z "$UPLOAD_URL" ]; then
            echo "ERREUR : Impossible de récupérer l'URL d'upload !"
            exit 1
          fi

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "$UPLOAD_URL?name=NeticAI.ipa" \
            --data-binary @build/NeticAI.ipa

          echo "Release publiée avec succès !"

    artifacts:
      - build/NeticAI.ipa
      - /tmp/xcodebuild_logs/*.log
