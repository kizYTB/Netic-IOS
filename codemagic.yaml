workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build iOS app (.ipa)
        script: |
          # Création manuelle d'un Info.plist propre avant la compilation
          cat << 'EOF' > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>fr.neticai.NeticAI</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Netic AI</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF
          
          # Régénère le projet avec le Info.plist forcé
          xcodegen generate

          # Build de l'application au format IPA
          xcodebuild clean build \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/NeticAI.xcarchive archive
            
          # Packaging de l'archive en IPA
          mkdir -p build/Payload
          cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/
    artifacts:
      - build/NeticAI.ipa
      - /tmp/xcodebuild_logs/*.log
