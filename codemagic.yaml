workflows:
  ios-workflow:
    name: Netic iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Install dependencies
        script: |
          # Si vous utilisez Swift Package Manager ou CocoaPods
          # xcodebuild -resolvePackageDependencies
          echo "Dependencies installed"
      - name: Build iOS App (Unsigned)
        script: |
          # Build pour iPhone physique sans signature
          xcodebuild build \
            -project "Netic.xcodeproj" \
            -scheme "Netic" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath $CM_BUILD_DIR/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-"
      - name: Package IPA (Unsigned)
        script: |
          # Création manuelle de la structure .ipa (Payload/)
          mkdir -p Payload
          cp -r $CM_BUILD_DIR/DerivedData/Build/Products/Release-iphoneos/Netic.app Payload/
          zip -r $CM_EXPORT_DIR/Netic.ipa Payload
    artifacts:
      - $CM_EXPORT_DIR/*.ipa
    publishing:
      email:
        recipients:
          - kylian@jtheberg.cloud # À adapter si besoin
        notify:
          success: true
          failure: true
