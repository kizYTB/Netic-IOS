- name: Build iOS app (.ipa)
  script: |

    set -e

    echo "Generating Xcode project..."
    xcodegen generate

    echo "Cleaning..."
    rm -rf ~/Library/Developer/Xcode/DerivedData

    echo "Archiving..."
    xcodebuild clean archive \
      -project "NeticAI.xcodeproj" \
      -scheme "NeticAI" \
      -configuration Release \
      -sdk iphoneos \
      -archivePath build/NeticAI.xcarchive \
      CODE_SIGN_IDENTITY="" \
      CODE_SIGNING_REQUIRED=NO \
      CODE_SIGNING_ALLOWED=NO

    echo "Creating IPA..."
    mkdir -p build/Payload
    cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/

    cd build
    zip -r NeticAI.ipa Payload/
