workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        GITHUB_TOKEN: $GITHUB_TOKEN
        RELEASE_TAG: "1.0.0"
        RELEASE_TITLE: "Netic AI"
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Build iOS app (.ipa)
        script: |
          cat << 'PLIST' > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>fr.neticai.NeticAI</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Netic AI</string>
              <key>CFBundleIconName</key>
              <string>AppIcon</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          PLIST

          xcodegen generate

          xcodebuild clean build \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/NeticAI.xcarchive archive

          mkdir -p build/Payload
          cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/

      - name: Supprimer et recréer la release GitHub
        script: |
          # Configurer git pour utiliser gh comme credential helper
          gh auth setup-git

          # Supprime la release + tag distant si existants
          gh release delete "$RELEASE_TAG" \
            --repo "kizYTB/Netic-IOS" \
            --yes \
            --cleanup-tag 2>/dev/null || echo "Aucune release existante, on continue."

          sleep 3

          # Supprime le tag local s'il existe
          git tag -d "$RELEASE_TAG" 2>/dev/null || true

          # Recrée le tag et push via gh (authentifié)
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

          # Crée la nouvelle release avec l'IPA
          gh release create "$RELEASE_TAG" \
            --repo "kizYTB/Netic-IOS" \
            --title "$RELEASE_TITLE $RELEASE_TAG" \
            --notes "Build automatique par Codemagic — $(date '+%d/%m/%Y %H:%M')" \
            build/NeticAI.ipa

    artifacts:
      - build/NeticAI.ipa
      - /tmp/xcodebuild_logs/*.log
