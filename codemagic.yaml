workflows:
  ios-build:
    name: Netic iOS Build
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Build iOS app (.ipa)
        script: |
          # Build de l'application au format IPA
          xcodebuild clean build \
            -project "NeticAI.xcodeproj" \
            -scheme "NeticAI" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/NeticAI.xcarchive archive
            
          # Packaging de l'archive en IPA
          mkdir -p build/Payload
          cp -r build/NeticAI.xcarchive/Products/Applications/NeticAI.app build/Payload/
          cd build
          zip -r NeticAI.ipa Payload/
    artifacts:
      - build/NeticAI.ipa
      - /tmp/xcodebuild_logs/*.log
